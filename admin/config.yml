backend:
  name: git-gateway
  branch: main

media_folder: "images/full"
public_folder: "/images/full"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings.json"
        fields:
          - { label: "Site Title", name: "title", widget: "string", default: "Fudoshin Karate-Do Club Wien" }
          - { label: "Contact Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Address", name: "address", widget: "text" }

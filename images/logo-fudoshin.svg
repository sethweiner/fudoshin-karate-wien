<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <path id="topArc" d="M 200,200 m -175,0 a 175,175 0 1,1 350,0" fill="none"/>
    <path id="bottomArc" d="M 55,200 a 145,145 0 0,0 290,0" fill="none"/>
  </defs>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="#1a1a1a" stroke-width="4"/>

  <!-- Dark ring band -->
  <path d="M 200,4 a 196,196 0 1,1 0,392 a 196,196 0 1,1 0,-392 Z M 200,38 a 162,162 0 1,0 0,324 a 162,162 0 1,0 0,-324 Z" fill="#1a1a1a" fill-rule="evenodd"/>

  <!-- Inner border -->
  <circle cx="200" cy="200" r="162" fill="#c23b3b" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Impact burst / cracked wall lines radiating from fist -->
  <g stroke="#a82a2a" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6">
    <line x1="200" y1="120" x2="200" y2="62"/>
    <line x1="200" y1="268" x2="200" y2="320"/>
    <line x1="128" y1="195" x2="65" y2="195"/>
    <line x1="272" y1="195" x2="335" y2="195"/>
    <line x1="145" y1="135" x2="95" y2="85"/>
    <line x1="255" y1="135" x2="305" y2="85"/>
    <line x1="145" y1="255" x2="100" y2="300"/>
    <line x1="255" y1="255" x2="300" y2="300"/>
    <!-- Shorter secondary cracks -->
    <line x1="170" y1="125" x2="145" y2="72"/>
    <line x1="230" y1="125" x2="255" y2="72"/>
    <line x1="130" y1="160" x2="72" y2="135"/>
    <line x1="270" y1="160" x2="328" y2="135"/>
    <line x1="130" y1="235" x2="75" y2="260"/>
    <line x1="270" y1="235" x2="325" y2="260"/>
  </g>

  <!-- Curved text — top: FUDOSHIN KARATE-DO -->
  <text fill="#ffffff" font-family="Arial Black, Impact, Helvetica, sans-serif" font-weight="900" font-size="27" letter-spacing="4.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">FUDOSHIN KARATE-DO</textPath>
  </text>

  <!-- Curved text — bottom: CLUB WIEN -->
  <text fill="#ffffff" font-family="Arial Black, Impact, Helvetica, sans-serif" font-weight="900" font-size="30" letter-spacing="10">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">CLUB WIEN</textPath>
  </text>

  <!-- Separator dots -->
  <circle cx="66" cy="240" r="5" fill="#ffffff"/>
  <circle cx="334" cy="240" r="5" fill="#ffffff"/>

  <!-- ═══ FIST — forward-facing seiken punch ═══ -->
  <g transform="translate(200,192)">

    <!-- Wrist / forearm -->
    <path d="M -28,40 L -28,80 Q -28,88 -20,88 L 20,88 Q 28,88 28,80 L 28,40 Z" fill="#d4a88c" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>
    <!-- Wrist crease -->
    <line x1="-20" y1="44" x2="20" y2="44" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-18" y1="52" x2="18" y2="52" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

    <!-- Main fist block (fingers curled) -->
    <rect x="-50" y="-40" width="100" height="84" rx="12" fill="#d4a88c" stroke="#1a1a1a" stroke-width="4"/>

    <!-- Knuckle row — four bumps -->
    <ellipse cx="-33" cy="-40" rx="16" ry="10" fill="#d4a88c" stroke="#1a1a1a" stroke-width="3.5"/>
    <ellipse cx="-6" cy="-42" rx="16" ry="11" fill="#d4a88c" stroke="#1a1a1a" stroke-width="3.5"/>
    <ellipse cx="22" cy="-42" rx="16" ry="11" fill="#d4a88c" stroke="#1a1a1a" stroke-width="3.5"/>
    <ellipse cx="45" cy="-38" rx="11" ry="9" fill="#d4a88c" stroke="#1a1a1a" stroke-width="3.5"/>

    <!-- Finger fold lines (horizontal, showing curled fingers from front) -->
    <line x1="-42" y1="-12" x2="42" y2="-12" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="-42" y1="14" x2="42" y2="14" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

    <!-- Vertical finger separations -->
    <line x1="-18" y1="-40" x2="-18" y2="40" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="8" y1="-42" x2="8" y2="40" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="34" y1="-38" x2="34" y2="40" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Thumb (left side, tucked across bottom of fingers) -->
    <path d="M -50,14 C -62,14 -68,4 -68,-10 C -68,-26 -60,-36 -50,-36 L -46,-36 C -46,-36 -46,14 -46,14 Z" fill="#d4a88c" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>
    <!-- Thumb joint -->
    <line x1="-56" y1="-10" x2="-46" y2="-10" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Thumb nail hint -->
    <path d="M -56,-26 Q -52,-30 -48,-26" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.35"/>

    <!-- Curled finger tips visible at bottom -->
    <path d="M -44,40 C -44,50 -38,54 -30,54 L 30,54 C 38,54 44,50 44,40" fill="#d4a88c" stroke="#1a1a1a" stroke-width="3.5"/>
    <!-- Finger tip separations -->
    <line x1="-14" y1="40" x2="-14" y2="52" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="10" y1="40" x2="10" y2="53" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  </g>
</svg>

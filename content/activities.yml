items:
  - title: "Turniere"
    image_thumb: "images/fudoshin-karate-do-wien_activity-turniere.jpg"
    image_full: "images/fudoshin-karate-do-wien_activity-turniere.jpg"
    alt: "Turniere"
    photo_credit: ""
    description: "Unsere Mitglieder nehmen regelmäßig an nationalen und internationalen Meisterschaften teil. Dabei sammeln sie wertvolle Erfahrungen, wachsen über sich hinaus und zeigen ihr Können im sportlichen Wettkampf. Besonders für Kinder und Jugendliche ist das eine große Chance: Sie stärken ihr Selbstvertrauen, lernen mit Erfolgen und Niederlagen umzugehen und entwickeln Disziplin, Respekt und Zielstrebigkeit."

  - title: "Selbstverteidigung"
    image_thumb: "images/fudoshin-karate-do-wien_activity-lehrgaenge.jpg"
    image_full: "images/fudoshin-karate-do-wien_activity-lehrgaenge.jpg"
    alt: "Selbstverteidigung"
    photo_credit: ""
    description: "Unser Karateverein bietet praxisorientierte Selbstverteidigungskurse auf Basis des ABS-Systems an: A steht für Ablenken, B für Befreiung und S für Stoßen. Dieses leicht verständliche Konzept vermittelt effektive Techniken, um sich in Gefahrensituationen schnell und gezielt zu schützen. Neben den praktischen Fähigkeiten stärken die Kurse auch das Selbstbewusstsein, die Reaktionsfähigkeit und das Sicherheitsgefühl im Alltag."

  - title: "Ferien-Camps"
    image_thumb: "images/fudoshin-karate-do-wien_activity-feriencamps.jpg"
    image_full: "images/fudoshin-karate-do-wien_activity-feriencamps.jpg"
    alt: "Ferien-Camps"
    photo_credit: ""
    description: "In den Schulferien bieten wir Karate-Camps für Kinder und Jugendliche an — eine Woche voller Training, Spiele, Bewegung und Ausflüge. Betreut von erfahrenen Trainern, offen für alle Erfahrungsstufen."
